name: PROS Build Template

on:
  push:
    branches: "**"
  pull_request:
    branches: "**"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build template
        id: build
        run: |
          set -euo pipefail

          docker run --rm \
            --entrypoint /bin/bash \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            -w /github/workspace \
            ghcr.io/lemlib/pros-build:v4.0.0 \
            -c '
              set -euo pipefail
              export PATH="/arm-none-eabi-toolchain/bin:/root/.local/bin:${PATH}"

              git config --global --add safe.directory /github/workspace

              sha="$(git rev-parse HEAD | head -c 6)"
              version="$(sed -n "s/^VERSION:=//p" Makefile | tr -d "[:space:]" | head -n 1)"
              library_name="$(sed -n "s/^LIBNAME:=//p" Makefile | tr -d "[:space:]" | head -n 1)"
              name="${library_name}@${version}+${sha}"

              make clean -j
              sed -i "s/^VERSION:=.*$/VERSION:=${version}+${sha}/" Makefile
              make template -j
              rm -rf template
              unzip -o "${name}.zip" -d template
              printf "%s\n" "${name}" > .pros-template-name
            '

          echo "name=$(cat .pros-template-name)" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.name }}
          path: ${{ github.workspace }}/template/*
